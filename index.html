<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CTO vs Hiring Chaos</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#06060f;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace}
#wrap{position:relative;width:860px;max-width:100vw}
canvas{display:block;width:100%;border-radius:14px;border:2px solid #1e1e3a;box-shadow:0 0 50px rgba(100,100,255,0.18)}
.ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:rgba(8,8,22,0.94);border-radius:14px}
.ov.off{display:none}
.big{font-size:19px;color:#ff6b6b;text-align:center;line-height:2.1;text-shadow:0 0 22px rgba(255,100,100,0.5)}
.blink{font-size:9px;color:#7c7cff;animation:bl 1s step-end infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
.hintbox{background:#10102a;border:1px solid #2a2a50;border-radius:8px;padding:14px 22px;font-size:7px;color:#555;line-height:2.8;text-align:center}
.hintbox b{color:#4caf7d}
.hintbox .red{color:#ff6b6b}
.nr{display:flex;flex-direction:column;align-items:center;gap:8px}
.nr label{font-size:7px;color:#7c7cff}
.ni{background:#12122a;border:2px solid #7c7cff;color:#e0e0ff;font-family:'Press Start 2P',monospace;font-size:12px;padding:8px 14px;border-radius:4px;outline:none;width:200px;text-align:center}
.ni:focus{border-color:#ff6b6b}
.sr{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.sb{background:#10102a;border:1px solid #2a2a50;border-radius:8px;padding:10px 14px;text-align:center;min-width:90px}
.sl{font-size:6px;color:#444;margin-bottom:6px}
.sv{font-size:13px;color:#e0e0ff}
.sv.g{color:#4caf7d} .sv.r{color:#ff6b6b}
.vd{font-size:7px;color:#ffaa00;text-align:center;line-height:2.4;max-width:480px;padding:0 10px}
.btn{font-family:'Press Start 2P',monospace;font-size:8px;padding:11px 20px;border:none;border-radius:4px;cursor:pointer;color:#fff;transition:filter .15s,transform .1s}
.btn:hover{filter:brightness(1.12);transform:translateY(-2px)}
.btn:active{transform:scale(0.96)}
.br{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.go-t{font-size:13px;text-align:center}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="860" height="320"></canvas>

  <!-- START -->
  <div class="ov" id="ov-s">
    <div class="big">CTO vs<br>HIRING CHAOS</div>
    <div class="nr">
      <label>YOUR NAME, CTO</label>
      <input class="ni" id="inp" maxlength="12" placeholder="CTO" autocomplete="off"/>
    </div>
    <div class="blink">— PRESS ↑ or TAP TO START —</div>
    <div class="hintbox">
      <b>↑ Arrow</b> = Jump over obstacles on the ground<br>
      <b>SPACE</b> = Fire Intervue ammo at Head of Talent<br>
      Jump to grab floating <b>Intervue drops</b> above the ground<br>
      <span class="red">5 obstacle hits = GAME OVER</span> &nbsp;|&nbsp; <b>Kill the Head of Talent = YOU WIN!</b>
    </div>
  </div>

  <!-- END -->
  <div class="ov off" id="ov-e">
    <div class="go-t" id="go-t"></div>
    <div class="sr" id="go-sr"></div>
    <div class="vd" id="go-vd"></div>
    <div class="br">
      <button class="btn" style="background:#e74c3c;box-shadow:0 4px 0 #922b21" onclick="doRestart()">🔄 PLAY AGAIN</button>
      <button class="btn" style="background:#4caf7d;box-shadow:0 4px 0 #2a6647" onclick="window.open('https://intervue.io','_blank')">⚡ TRY INTERVUE</button>
    </div>
  </div>
</div>

<script>
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
const W = 860, H = 320;
const GY = H - 60;        // ground surface y
const PX = 90;             // player fixed x
const PLAYER_W = 38, PLAYER_H = 54;
const MAX_LIVES = 5;

// ── villain ───────────────────────────────────────────────
const VIL = { x: W - 130, baseY: GY - 90, w: 68, h: 90, hp: 20, maxHp: 20 };

// ── state ─────────────────────────────────────────────────
let mode = 'start';
let pName = 'CTO';
let py, pvy, onGround, shootCD, invTimer;
let lives, ammo, ptsLost, ptsSaved, ammoUsed, score, dist, spd;
let spawnT, ammoDropT;
let obs, adrops, bullets, sparks, stars;
let legF = 0, legT = 0;
let flashT = 0, flashCol = '';
let vilShake = 0, vilBob = 0, vilBobDir = 1;
let raf;

// ── obstacle types ────────────────────────────────────────
const OT = [
  { line1:'Endless',   line2:'Interviews', time:'1 hour',   icon:'🎤', pts:5, col:'#c0392b', w:76, h:66 },
  { line1:'Panel',     line2:'Round 3+',   time:'1 hour',   icon:'🎤', pts:5, col:'#c0392b', w:76, h:66 },
  { line1:'Feedback',  line2:'Loop',       time:'20 mins',  icon:'📝', pts:2, col:'#d35400', w:70, h:60 },
  { line1:'Hiring',    line2:'Chaos',      time:'10 mins',  icon:'📋', pts:1, col:'#7d3c98', w:62, h:54 },
];

// ── input ─────────────────────────────────────────────────
const K = {};
window.addEventListener('keydown', e => {
  if(['Space','ArrowUp'].includes(e.code)) e.preventDefault();
  if(K[e.code]) return;
  K[e.code] = true;
  if(mode === 'start' && e.code === 'ArrowUp') { doStart(); return; }
  if(mode !== 'play') return;
  if(e.code === 'ArrowUp') tryJump();
  if(e.code === 'Space') tryShoot();
});
window.addEventListener('keyup', e => { K[e.code] = false; });

// tap: left half = jump, right half = shoot
cv.addEventListener('pointerdown', e => {
  const rect = cv.getBoundingClientRect();
  const tx = (e.clientX - rect.left) / rect.width * W;
  if(mode === 'start') { doStart(); return; }
  if(mode !== 'play') return;
  if(tx < W / 2) tryJump(); else tryShoot();
});
document.getElementById('ov-s').addEventListener('click', e => {
  if(e.target.tagName === 'INPUT') return;
  if(mode === 'start') doStart();
});

// ── actions ───────────────────────────────────────────────
function tryJump() {
  if(onGround) { pvy = -14; onGround = false; }
}

function tryShoot() {
  if(ammo <= 0 || shootCD > 0) return;
  ammo--; ammoUsed++; shootCD = 18;
  bullets.push({ x: PX + PLAYER_W + 4, y: py + 18, w: 24, h: 10, spd: 13 });
  addSparks(PX + PLAYER_W + 4, py + 18, '#ffee44', 6);
}

// ── lifecycle ─────────────────────────────────────────────
function initVars() {
  pName = (document.getElementById('inp').value.trim() || 'CTO').substring(0, 12).toUpperCase();
  py = GY - PLAYER_H; pvy = 0; onGround = true; shootCD = 0; invTimer = 0;
  lives = MAX_LIVES; ammo = 3; ptsLost = 0; ptsSaved = 0; ammoUsed = 0;
  score = 0; dist = 0; spd = 4;
  spawnT = 90; ammoDropT = 220;
  obs = []; adrops = []; bullets = []; sparks = [];
  flashT = 0; legF = 0; legT = 0;
  vilShake = 0; vilBob = 0; vilBobDir = 1;
  VIL.hp = VIL.maxHp = 20;
  stars = Array.from({length:70}, () => ({
    x: Math.random()*W, y: Math.random()*(GY - 30),
    r: Math.random()*1.7+0.3, op: Math.random()*0.45+0.08,
    s: Math.random()*0.38+0.06
  }));
}

function doStart() {
  document.getElementById('ov-s').classList.add('off');
  document.getElementById('ov-e').classList.add('off');
  initVars(); mode = 'play';
  if(raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(tick);
}

function doRestart() {
  document.getElementById('ov-e').classList.add('off');
  initVars(); mode = 'play';
  if(raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(tick);
}

// pts: 5=60min, 2=20min, 1=10min → total minutes = pts*12
function fmtTime(pts) {
  const mins = pts * 12;
  if(mins < 60) return mins + ' mins';
  const h = Math.floor(mins/60), m = mins%60;
  return m > 0 ? h+'h '+m+'m' : h+'h';
}

function doEnd(won) {
  mode = 'end';
  const tot = ptsLost + ptsSaved;
  const eff = tot > 0 ? Math.round(ptsSaved / tot * 100) : 0;
  const hL = fmtTime(ptsLost);
  const hS = fmtTime(ptsSaved);

  const titleEl = document.getElementById('go-t');
  if(won) {
    titleEl.textContent = '🏆 HEAD OF TALENT DEFEATED!';
    titleEl.style.color = '#4caf7d';
  } else {
    titleEl.textContent = '💀 HIRING CHAOS WON!';
    titleEl.style.color = '#ff6b6b';
  }

  document.getElementById('go-sr').innerHTML = `
    <div class="sb"><div class="sl">SCORE</div><div class="sv">${score}</div></div>
    <div class="sb"><div class="sl">LIVES LEFT</div><div class="sv ${lives>2?'g':'r'}">${lives}/${MAX_LIVES}</div></div>
    <div class="sb"><div class="sl">TIME LOST</div><div class="sv r">${hL}</div></div>
    <div class="sb"><div class="sl">TIME SAVED</div><div class="sv g">${hS}</div></div>
    <div class="sb"><div class="sl">AMMO FIRED</div><div class="sv g">${ammoUsed}x</div></div>
    <div class="sb"><div class="sl">EFFICIENCY</div><div class="sv g">${eff}%</div></div>`;

  const v = eff >= 75
    ? `🏆 LEGENDARY! ${pName} saved ${hS} of engineering time using Intervue!`
    : eff >= 50
    ? `✅ SOLID PLAY! Intervue saved ${hS}. Keep building, not screening!`
    : eff >= 30
    ? `⚠️ ${hL} lost to manual processes. Use more Intervue ammo next time!`
    : `😰 HIRING CHAOS! ${hL} wasted. Let Intervue handle interviews and take back your time!`;
  document.getElementById('go-vd').textContent = v;
  document.getElementById('ov-e').classList.remove('off');
}

// ── helpers ───────────────────────────────────────────────
function addSparks(x, y, col, n) {
  for(let i = 0; i < n; i++) {
    const a = Math.random()*Math.PI*2, s = Math.random()*5+1;
    sparks.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 1.5,
      col, life: 1, dec: 0.04+Math.random()*0.06, r: Math.random()*4+1.5 });
  }
}
function flash(col, t) { flashCol = col; flashT = t; }
function rr(x,y,w,h,r) {
  cx.beginPath(); cx.moveTo(x+r,y); cx.lineTo(x+w-r,y);
  cx.quadraticCurveTo(x+w,y,x+w,y+r); cx.lineTo(x+w,y+h-r);
  cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); cx.lineTo(x+r,y+h);
  cx.quadraticCurveTo(x,y+h,x,y+h-r); cx.lineTo(x,y+r);
  cx.quadraticCurveTo(x,y,x+r,y); cx.closePath();
}
function dk(hex, a) {
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-a)},${Math.max(0,g-a)},${Math.max(0,b-a)})`;
}
function rectsHit(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

// ── UPDATE ────────────────────────────────────────────────
function tick() {
  if(mode === 'play') update();
  draw();
  raf = requestAnimationFrame(tick);
}

function update() {
  dist++; score = Math.floor(dist / 8);

  // stars
  stars.forEach(s => { s.x -= s.s; if(s.x < 0) s.x = W; });

  // player gravity
  pvy += 0.65; py += pvy;
  if(py >= GY - PLAYER_H) { py = GY - PLAYER_H; pvy = 0; onGround = true; }

  if(shootCD > 0) shootCD--;
  if(invTimer > 0) invTimer--;
  if(flashT > 0) flashT--;

  // legs
  if(onGround) { legT++; if(legT > 5) { legF = (legF+1)%4; legT = 0; } }

  // villain bob
  vilBob += 0.055 * vilBobDir;
  if(Math.abs(vilBob) > 7) vilBobDir *= -1;
  if(vilShake > 0) vilShake--;

  // speed up gently
  spd = 4 + Math.floor(dist / 600) * 0.4;

  // spawn obstacles on ground
  spawnT--;
  if(spawnT <= 0) {
    const t = OT[Math.floor(Math.random() * OT.length)];
    obs.push({
      x: W + 10,
      y: GY - t.h,
      w: t.w, h: t.h,
      pts: t.pts, line1: t.line1, line2: t.line2, time: t.time, icon: t.icon, col: t.col,
    });
    spawnT = Math.max(52, 105 - Math.floor(dist/400)*5);
  }

  // spawn ammo drops ABOVE ground — player jumps to collect
  ammoDropT--;
  if(ammoDropT <= 0) {
    adrops.push({
      x: W + 10,
      y: GY - PLAYER_H - 55 - Math.random()*30,   // floats in the air
      r: 18, ph: Math.random()*Math.PI*2
    });
    ammoDropT = 200 + Math.random()*120;
  }

  // update obstacles — scroll left
  for(let i = obs.length-1; i >= 0; i--) {
    const o = obs[i];
    o.x -= spd;
    if(o.x + o.w < 0) {
      // passed — counts as time lost
      ptsLost += o.pts;
      obs.splice(i, 1);
      flash('rgba(255,70,70,0.22)', 12);
      continue;
    }
    // player collision
    if(invTimer <= 0 && rectsHit(
      PX+5, py+4, PLAYER_W-8, PLAYER_H-6,
      o.x, o.y, o.w, o.h
    )) {
      lives--;
      ptsLost += o.pts;
      obs.splice(i, 1);
      invTimer = 55;
      flash('rgba(255,60,60,0.4)', 24);
      addSparks(PX + PLAYER_W/2, py + PLAYER_H/2, '#ff6b6b', 16);
      if(lives <= 0) { doEnd(false); return; }
    }
  }

  // update ammo drops — scroll left, float up-down
  for(let i = adrops.length-1; i >= 0; i--) {
    const d = adrops[i];
    d.x -= spd * 0.75;
    d.ph += 0.09;
    if(d.x + d.r < 0) { adrops.splice(i, 1); continue; }
    // collect: player bounding box vs drop circle
    const fy = d.y + Math.sin(d.ph) * 10;
    const px_c = PX + PLAYER_W/2, py_c = py + PLAYER_H/2;
    if(Math.hypot(px_c - d.x, py_c - fy) < d.r + 22) {
      ammo++;
      addSparks(d.x, fy, '#4caf7d', 14);
      adrops.splice(i, 1);
      flash('rgba(76,175,125,0.28)', 8);
    }
  }

  // update bullets — travel right toward villain
  for(let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.spd;
    if(b.x > W + 20) { bullets.splice(i, 1); continue; }

    // hit villain
    const vilY = VIL.baseY + vilBob;
    if(rectsHit(b.x, b.y, b.w, b.h, VIL.x, vilY, VIL.w, VIL.h)) {
      VIL.hp--;
      ptsSaved += 3;
      bullets.splice(i, 1);
      vilShake = 8;
      addSparks(VIL.x + VIL.w/2, vilY + VIL.h/2, '#ffee44', 12);
      addSparks(VIL.x + VIL.w/2, vilY + VIL.h/2, '#ff6b6b', 6);
      flash('rgba(255,238,68,0.2)', 8);
      if(VIL.hp <= 0) {
        // big explosion
        for(let k=0;k<5;k++) addSparks(VIL.x+Math.random()*VIL.w, vilY+Math.random()*VIL.h, k%2?'#ffee44':'#ff6b6b', 20);
        doEnd(true);
        return;
      }
      continue;
    }
  }

  // sparks
  for(let i = sparks.length-1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx; s.y += s.vy; s.vy += 0.22; s.life -= s.dec;
    if(s.life <= 0) sparks.splice(i, 1);
  }
}

// ── DRAW ──────────────────────────────────────────────────
function draw() {
  // sky
  cx.fillStyle = '#0a0a1a'; cx.fillRect(0, 0, W, H);

  // stars
  stars.forEach(s => {
    cx.beginPath(); cx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    cx.fillStyle = `rgba(255,255,255,${s.op})`; cx.fill();
  });

  // background city silhouette
  drawCity();

  // sparks
  sparks.forEach(s => {
    cx.save(); cx.globalAlpha = s.life;
    cx.fillStyle = s.col; cx.beginPath(); cx.arc(s.x, s.y, s.r, 0, Math.PI*2); cx.fill();
    cx.restore();
  });

  // ammo drops (Intervue branded)
  adrops.forEach(d => drawIntervueDrop(d));

  // obstacles (on ground)
  obs.forEach(o => drawObs(o));

  // bullets
  bullets.forEach(b => {
    cx.save();
    cx.shadowColor = '#ffee44'; cx.shadowBlur = 16;
    cx.fillStyle = '#ffee44';
    cx.beginPath(); cx.ellipse(b.x+b.w/2, b.y+b.h/2, b.w/2, b.h/2, 0, 0, Math.PI*2); cx.fill();
    cx.fillStyle = '#fffde0';
    cx.beginPath(); cx.ellipse(b.x+b.w/2-5, b.y+b.h/2-1, b.w/6, b.h/3.5, 0, 0, Math.PI*2); cx.fill();
    cx.restore();
  });

  // ground
  cx.fillStyle = '#141428'; cx.fillRect(0, GY, W, H - GY);
  cx.strokeStyle = '#2a2a52'; cx.lineWidth = 2;
  cx.beginPath(); cx.moveTo(0, GY); cx.lineTo(W, GY); cx.stroke();
  // scrolling dashes
  cx.strokeStyle = '#1e1e42'; cx.lineWidth = 1;
  const gOff = (dist * spd * 0.5) % 70;
  for(let gx = W - gOff; gx > -70; gx -= 70) {
    cx.beginPath(); cx.moveTo(gx, GY+12); cx.lineTo(gx+35, GY+12); cx.stroke();
  }

  // villain
  drawVillain();

  // player
  drawPlayer();

  // flash overlay
  if(flashT > 0) {
    cx.globalAlpha = flashT / 22; cx.fillStyle = flashCol; cx.fillRect(0,0,W,H); cx.globalAlpha = 1;
  }

  // HUD
  drawHUD();
}

function drawCity() {
  const blds = [[80,28],[150,18],[230,38],[310,22],[390,42],[470,16],[550,34],[640,24],[730,40]];
  cx.fillStyle = '#0c0c22';
  blds.forEach(([bx,bh]) => {
    cx.fillRect(bx, GY-bh, 24, bh);
    // windows
    for(let wy=GY-bh+5;wy<GY-5;wy+=9) {
      for(let wx=bx+4;wx<bx+20;wx+=8) {
        const lit = Math.sin(bx*0.3+wx*0.7+wy*0.5) > 0.3;
        cx.fillStyle = lit ? '#1e1e40' : '#0e0e28';
        cx.fillRect(wx, wy, 4, 4);
      }
    }
  });
}

function drawObs(o) {
  const x=o.x, y=o.y, w=o.w, h=o.h;
  // ground shadow
  cx.fillStyle = 'rgba(0,0,0,0.28)';
  cx.beginPath(); cx.ellipse(x+w/2, GY+3, w*0.44, 5, 0, 0, Math.PI*2); cx.fill();
  // body
  cx.fillStyle = o.col; rr(x,y,w,h,8); cx.fill();
  // shine
  cx.fillStyle = 'rgba(255,255,255,0.09)'; rr(x+4,y+4,w-8,h*0.22,6); cx.fill();
  // darker bottom
  cx.fillStyle = dk(o.col,28); rr(x,y+h*0.5,w,h*0.5,8); cx.fill();
  // icon
  cx.font = `${Math.min(w,h)*0.34}px sans-serif`;
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillText(o.icon, x+w/2, y+h*0.25);
  // two-line clean label
  cx.fillStyle = '#fff';
  cx.font = 'bold 11px Arial, sans-serif';
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillText(o.line1, x+w/2, y+h*0.52);
  cx.fillText(o.line2, x+w/2, y+h*0.67);
  // time badge — clock icon + time string
  cx.fillStyle = 'rgba(0,0,0,0.4)'; rr(x+w/2-22, y+h*0.78, 44, 14, 4); cx.fill();
  cx.fillStyle = '#ffe066';
  cx.font = 'bold 9px Arial, sans-serif';
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillText('⏱ ' + o.time, x+w/2, y+h*0.86);
}

function drawIntervueDrop(d) {
  const fy = d.y + Math.sin(d.ph)*10;
  cx.save();

  // outer glow ring
  cx.shadowColor = '#4caf7d'; cx.shadowBlur = 22;
  cx.strokeStyle = '#4caf7d'; cx.lineWidth = 2.5;
  cx.beginPath(); cx.arc(d.x, fy, d.r, 0, Math.PI*2); cx.stroke();
  cx.shadowBlur = 0;

  // black background circle (logo style)
  cx.fillStyle = '#000';
  cx.beginPath(); cx.arc(d.x, fy, d.r - 2, 0, Math.PI*2); cx.fill();

  // draw "e" letter like Intervue logo
  const R = d.r - 5;
  const ex = d.x, ey = fy - R*0.15;
  const eR = R * 0.65;
  // white "e" arc (open on right)
  cx.strokeStyle = '#fff'; cx.lineWidth = eR * 0.28; cx.lineCap = 'round';
  cx.beginPath();
  cx.arc(ex, ey, eR, Math.PI*0.15, Math.PI*1.85);
  cx.stroke();
  // horizontal bar of "e"
  cx.beginPath();
  cx.moveTo(ex - eR, ey);
  cx.lineTo(ex + eR * 0.55, ey);
  cx.stroke();

  // underline bar (logo mark below "e")
  const barW = eR * 1.4, barH = eR * 0.22;
  cx.fillStyle = '#fff';
  cx.fillRect(ex - barW/2, fy + R*0.42, barW, barH);

  // "INTERVUE" text below drop
  cx.fillStyle = '#4caf7d';
  cx.font = 'bold 9px Arial, sans-serif';
  cx.textAlign = 'center'; cx.textBaseline = 'top';
  cx.fillText('INTERVUE', d.x, fy + d.r + 6);

  // dashed guide line to ground
  cx.setLineDash([3,5]); cx.strokeStyle = '#1a3a2a'; cx.lineWidth = 1;
  cx.beginPath(); cx.moveTo(d.x, fy + d.r); cx.lineTo(d.x, GY); cx.stroke();
  cx.setLineDash([]);

  cx.restore();
}

function drawPlayer() {
  const x = PX, y = py;
  const blink = invTimer > 0 && Math.floor(invTimer/4)%2 === 0;
  if(blink) cx.globalAlpha = 0.3;

  // shadow
  cx.fillStyle = 'rgba(0,0,0,0.22)';
  cx.beginPath(); cx.ellipse(x+PLAYER_W/2, GY+4, 18, 5, 0, 0, Math.PI*2); cx.fill();

  // legs
  const lp = [[0,0],[9,-5],[0,0],[-9,-5]][onGround ? legF : 0];
  cx.fillStyle = '#1a3a6a';
  cx.fillRect(x+8,  y+PLAYER_H-14, 11, 14+lp[0]);
  cx.fillRect(x+20, y+PLAYER_H-14, 11, 14+lp[1]);
  // shoes
  cx.fillStyle = '#0d1e3a';
  cx.fillRect(x+6,  y+PLAYER_H+lp[0], 14, 5);
  cx.fillRect(x+18, y+PLAYER_H+lp[1], 14, 5);

  // body
  cx.fillStyle = '#2e6da4'; rr(x+4, y+22, PLAYER_W-4, 25, 5); cx.fill();
  cx.fillStyle = '#7c7cff'; rr(x+8, y+27, PLAYER_W-12, 13, 3); cx.fill();
  // badge
  cx.fillStyle = '#fff'; rr(x+10, y+29, PLAYER_W-16, 8, 2); cx.fill();
  cx.fillStyle = '#2e6da4'; cx.font = '5px "Press Start 2P"'; cx.textAlign = 'center';
  cx.fillText('CTO', x+PLAYER_W/2, y+34);

  // left arm
  cx.fillStyle = '#2e6da4'; cx.fillRect(x-3, y+24, 7, 15);
  // right arm — extended if shooting
  if(shootCD > 0) {
    cx.fillStyle = '#2e6da4'; cx.fillRect(x+PLAYER_W-2, y+22, 7, 10);
    cx.fillStyle = '#ffee44';
    cx.beginPath(); cx.arc(x+PLAYER_W+7, y+25, 5, 0, Math.PI*2); cx.fill();
  } else {
    cx.fillStyle = '#2e6da4'; cx.fillRect(x+PLAYER_W-2, y+24, 7, 15);
  }

  // head
  cx.fillStyle = '#4a90d9'; rr(x+6, y, PLAYER_W-8, 24, 6); cx.fill();
  // hair
  cx.fillStyle = '#1a3a6a'; rr(x+6, y, PLAYER_W-8, 7, 5); cx.fill();
  // glasses
  cx.strokeStyle = '#1a3a6a'; cx.lineWidth = 1.5;
  cx.strokeRect(x+9, y+8, 9, 7);
  cx.strokeRect(x+21, y+8, 9, 7);
  cx.beginPath(); cx.moveTo(x+18, y+11); cx.lineTo(x+21, y+11); cx.stroke();
  // eyes
  cx.fillStyle = '#e8f4ff'; cx.fillRect(x+10, y+9, 7, 5); cx.fillRect(x+22, y+9, 7, 5);
  cx.fillStyle = '#1a3a6a'; cx.fillRect(x+12, y+10, 3, 3); cx.fillRect(x+24, y+10, 3, 3);
  // smile
  cx.strokeStyle = '#1a3a6a'; cx.lineWidth = 1.5;
  cx.beginPath(); cx.arc(x+PLAYER_W/2, y+19, 4, 0.3, Math.PI-0.3); cx.stroke();

  cx.globalAlpha = 1;
}

function drawVillain() {
  const shake = vilShake > 0 ? (Math.random()*10-5) : 0;
  const vx = VIL.x + shake;
  const vy = VIL.baseY + vilBob;
  const vw = VIL.w, vh = VIL.h;

  // HP bar
  const hbW = 100, hbH = 10, hbX = vx+(vw-hbW)/2, hbY = vy - 30;
  cx.fillStyle = '#0d0d22'; rr(hbX-2,hbY-2,hbW+4,hbH+4,4); cx.fill();
  cx.fillStyle = '#3a1010'; rr(hbX,hbY,hbW,hbH,3); cx.fill();
  const hpFrac = VIL.hp / VIL.maxHp;
  if(hpFrac > 0) {
    cx.fillStyle = hpFrac > 0.5 ? '#e74c3c' : hpFrac > 0.25 ? '#e67e22' : '#ff3333';
    rr(hbX,hbY,hbW*hpFrac,hbH,3); cx.fill();
  }
  // name above bar
  cx.fillStyle = '#ff6b6b'; cx.font = '5px "Press Start 2P"'; cx.textAlign = 'center';
  cx.fillText('HEAD OF TALENT', vx+vw/2, hbY-9);
  cx.fillStyle = '#888'; cx.font = '5px "Press Start 2P"';
  cx.fillText(VIL.hp+'/'+VIL.maxHp+' HP', vx+vw/2, hbY+hbH+10);

  // legs
  cx.fillStyle = '#6c1f1f';
  cx.fillRect(vx+10, vy+vh-14, 18, 14);
  cx.fillRect(vx+vw-28, vy+vh-14, 18, 14);
  cx.fillStyle = '#3a0f0f';
  cx.fillRect(vx+8,  vy+vh, 20, 6);
  cx.fillRect(vx+vw-28, vy+vh, 20, 6);

  // body
  cx.fillStyle = '#922b21'; rr(vx+5, vy+vh*0.44, vw-10, vh*0.56, 6); cx.fill();
  cx.fillStyle = '#c0392b'; rr(vx+10, vy+vh*0.46, vw-20, vh*0.5, 5); cx.fill();
  // tie
  cx.fillStyle = '#7d3c98'; cx.fillRect(vx+vw/2-4, vy+vh*0.46, 8, vh*0.28);
  cx.beginPath();
  cx.moveTo(vx+vw/2-6, vy+vh*0.74); cx.lineTo(vx+vw/2+6, vy+vh*0.74); cx.lineTo(vx+vw/2, vy+vh*0.85);
  cx.fill();
  // HR badge
  cx.fillStyle = '#fff'; rr(vx+12, vy+vh*0.54, vw-24, vh*0.19, 3); cx.fill();
  cx.fillStyle = '#c0392b'; cx.font = 'bold 7px "Press Start 2P"'; cx.textAlign = 'center';
  cx.fillText('HR', vx+vw/2, vy+vh*0.645);

  // arms (angry raise)
  cx.fillStyle = '#922b21';
  cx.save(); cx.translate(vx-5, vy+vh*0.44); cx.rotate(-0.45);
  cx.fillRect(0,0,14,20); cx.restore();
  cx.save(); cx.translate(vx+vw-9, vy+vh*0.42); cx.rotate(0.45);
  cx.fillRect(0,0,14,20); cx.restore();

  // head
  cx.fillStyle = '#c0392b'; rr(vx+7, vy, vw-14, vh*0.46, 8); cx.fill();
  // hair
  cx.fillStyle = '#1a0505'; rr(vx+7, vy, vw-14, 10, 6); cx.fill();
  // eyes
  cx.fillStyle = '#fff';
  cx.fillRect(vx+13, vy+13, 12, 10); cx.fillRect(vx+vw-25, vy+13, 12, 10);
  cx.fillStyle = '#1a0a0a';
  cx.fillRect(vx+15, vy+15, 8, 7); cx.fillRect(vx+vw-23, vy+15, 8, 7);
  cx.fillStyle = '#fff';
  cx.fillRect(vx+16, vy+16, 3, 3); cx.fillRect(vx+vw-22, vy+16, 3, 3);
  // angry brows
  cx.strokeStyle = '#1a0505'; cx.lineWidth = 3.5;
  cx.beginPath(); cx.moveTo(vx+11, vy+10); cx.lineTo(vx+26, vy+14); cx.stroke();
  cx.beginPath(); cx.moveTo(vx+vw-11, vy+10); cx.lineTo(vx+vw-26, vy+14); cx.stroke();
  // frown
  cx.strokeStyle = '#1a0505'; cx.lineWidth = 2.5;
  cx.beginPath(); cx.arc(vx+vw/2, vy+vh*0.35+4, 6, Math.PI+0.35, -0.35); cx.stroke();
}

function drawHUD() {
  // left panel
  cx.fillStyle = 'rgba(10,10,26,0.75)'; rr(10,10,235,68,8); cx.fill();
  cx.textAlign = 'left';
  cx.fillStyle = '#e0e0ff'; cx.font = '8px "Press Start 2P"';
  cx.fillText(pName, 20, 28);
  cx.fillStyle = '#888'; cx.font = '7px "Press Start 2P"';
  cx.fillText('SCORE: '+score, 20, 44);

  // lives as hearts
  cx.fillStyle = '#ff6b6b'; cx.font = '14px sans-serif'; cx.textAlign = 'left';
  let heartsX = 20;
  for(let i=0;i<MAX_LIVES;i++) {
    cx.globalAlpha = i < lives ? 1 : 0.2;
    cx.fillText('❤', heartsX, 64);
    heartsX += 20;
  }
  cx.globalAlpha = 1;

  // right panel
  cx.fillStyle = 'rgba(10,10,26,0.75)'; rr(W-245,10,235,68,8); cx.fill();
  cx.textAlign = 'right';
  cx.fillStyle = '#4caf7d'; cx.font = '9px "Press Start 2P"';
  cx.fillText('INTERVUE: '+ammo, W-18, 30);
  cx.fillStyle = '#ff6b6b'; cx.font = '6px "Press Start 2P"';
  cx.fillText('LOST: '+fmtTime(ptsLost), W-18, 46);
  cx.fillStyle = '#4caf7d';
  cx.fillText('SAVED: '+fmtTime(ptsSaved), W-18, 60);

  // bottom bar
  cx.fillStyle = 'rgba(10,10,26,0.6)'; rr(W/2-200,H-26,400,18,5); cx.fill();
  cx.textAlign = 'center'; cx.fillStyle = '#2a2a55'; cx.font = '5px "Press Start 2P"';
  cx.fillText('↑ JUMP over obstacles  |  SPACE = fire Intervue at Head of Talent  |  5 hits = game over', W/2, H-14);

  // no ammo warning
  if(ammo === 0) {
    cx.fillStyle = 'rgba(255,60,60,0.12)'; rr(10, H-48, 200, 18, 4); cx.fill();
    cx.fillStyle = '#ff6b6b'; cx.font = '5px "Press Start 2P"'; cx.textAlign = 'left';
    cx.fillText('NO AMMO — JUMP FOR INTERVUE!', 18, H-36);
  }
}

// ── initial static render ──────────────────────────────────
(function() {
  cx.fillStyle = '#0a0a1a'; cx.fillRect(0,0,W,H);
  for(let i=0;i<70;i++){
    cx.beginPath(); cx.arc(Math.random()*W, Math.random()*(GY-20), Math.random()*1.7+0.3, 0, Math.PI*2);
    cx.fillStyle = `rgba(255,255,255,${Math.random()*0.4+0.06})`; cx.fill();
  }
  cx.fillStyle = '#141428'; cx.fillRect(0,GY,W,H-GY);
  cx.strokeStyle = '#2a2a52'; cx.lineWidth = 2;
  cx.beginPath(); cx.moveTo(0,GY); cx.lineTo(W,GY); cx.stroke();
})();
</script>
